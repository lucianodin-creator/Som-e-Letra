<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA - PORTAL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .search-area { padding: 10px; background: #121212; display: flex; gap: 10px; }
        #frameBing { width: 100%; height: calc(100% - 120px); border: none; display: none; }
        input { flex-grow: 1; padding: 12px; border-radius: 20px; border: none; background: #282828; color: white; }
    </style>
</head>
<body>

    <header style="padding: 10px;">🎧 SOM E LETRA</header>

    <div class="search-area">
        <input type="text" id="campoBusca" placeholder="Busque música ou artista...">
        <button onclick="buscar()" style="background:#1db954; border:none; border-radius:20px; padding:0 20px; color:white; font-weight:bold;">IR</button>
    </div>

    <iframe id="frameBing"></iframe>

    <script>
        function buscar() {
            const termo = document.getElementById('campoBusca').value;
            if(!termo) return;
            const frame = document.getElementById('frameBing');
            frame.src = "https://www.bing.com/search?q=" + encodeURIComponent(termo + " letra e vídeo");
            frame.style.display = "block";
        }

        document.getElementById('campoBusca').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscar();
        });
    </script>
</body>
</html>
