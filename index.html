<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA - BUSCADOR</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .instrucao {
            color: #b3b3b3;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>🎧 SOM E LETRA</header>

    <div class="search-container">
        <input type="text" id="campoBusca" placeholder="Digite Música ou Artista...">
        <p class="instrucao">Pressione Enter para buscar letra e vídeo no Bing</p>
    </div>

    <main class="main-content">
        <div style="text-align: center; padding: 40px; color: #1db954;">
            <p>O melhor som, a letra certa.</p>
        </div>
    </main>

    <footer>Som e Letra © 2026</footer>

    <script>
        const campo = document.getElementById('campoBusca');

        campo.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const termo = this.value;
                if(!termo) return;
                
                // O segredo: Busca no Bing forçando letra e vídeo
                const urlBing = "https://www.bing.com/search?q=" + encodeURIComponent(termo + " letra e vídeo");
                
                // Abre na mesma aba para parecer que o site mudou de fase
                window.location.href = urlBing;
            }
        });
    </script>
</body>
</html>
