<html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA - PREMIUM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .nav-bar { background: #1db954; color: #000; padding: 15px; text-align: center; font-weight: bold; }
        .search-box { padding: 15px; background: #121212; display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #282828; color: #fff; }
        button { background: #1db954; border: none; border-radius: 25px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        #player-wrapper { width: 100%; aspect-ratio: 16/9; display: none; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .lista { padding: 10px; }
        .card { display: flex; align-items: center; gap: 12px; padding: 12px; background: #181818; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .card img { width: 90px; height: 60px; border-radius: 4px; object-fit: cover; }
        .titulo { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-bar">🎧 SOM E LETRA</div>
    <div id="player-wrapper"></div>
    <div class="search-box">
        <input type="text" id="busca" placeholder="Digite artista ou música..." autocomplete="off">
        <button onclick="buscar()">BUSCAR</button>
    </div>
    <div id="listaResultados" class="lista"></div>

    <script>
        async function buscar() {
            const termo = document.getElementById('busca').value;
            if(!termo) return;
            const lista = document.getElementById('listaResultados');
            lista.innerHTML = "<p style='text-align:center; color:#1db954'>Buscando no YouTube...</p>";
            
            // Tentei usar um servidor alternativo mais estável (iv.melmac.space)
            try {
                const res = await fetch(`https://iv.melmac.space/api/v1/search?q=${encodeURIComponent(termo)}&type=video`);
                const data = await res.json();
                
                if (data.length === 0) {
                    lista.innerHTML = "<p style='text-align:center'>Nenhuma música encontrada.</p>";
                    return;
                }

                lista.innerHTML = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.onclick = () => {
                        const wrapper = document.getElementById('player-wrapper');
                        wrapper.style.display = "block";
                        wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${item.videoId}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    
                    // Verificação de segurança para a imagem da capa
                    const thumb = item.videoThumbnails ? item.videoThumbnails[0].url : "";
                    
                    div.innerHTML = `
                        <img src="${thumb}" alt="capa">
                        <span class="titulo">${item.title}</span>
                    `;
                    lista.appendChild(div);
                });
            } catch (e) {
                console.log(e);
                lista.innerHTML = "<p style='text-align:center'>Servidor instável. Tente novamente em instantes.</p>";
            }
        }
    </script>
</body>
</html>
