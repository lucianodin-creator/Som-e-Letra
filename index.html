<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MORAES SHOP - EDITOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fundo: #0f172a; --barra-azul: #2563eb; --card: #1e293b; --gold: #fbbf24; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--fundo); font-family: sans-serif; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: var(--card); padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; height: 60px; flex-shrink: 0; }
        
        #main-view { flex: 1; overflow-y: auto; background: #334155; display: flex; flex-direction: column; align-items: center; width: 100%; padding-bottom: 120px; }
        
        .welcome-box { margin: auto; text-align: center; background: var(--card); padding: 30px 20px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--barra-azul); }
        
        canvas { max-width: 95%; height: auto !important; display: none; margin: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px; }

        /* A BARRA AZUL DOS SONHOS */
        .dream-toolbar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--barra-azul); display: flex; justify-content: space-around; align-items: center; height: 105px; padding-bottom: 20px; z-index: 9999; box-shadow: 0 -5px 25px rgba(0,0,0,0.4); }
        
        .btn-dream { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; opacity: 0.4; pointer-events: none; }
        .btn-dream.ativo { opacity: 1; pointer-events: auto; }
        
        .btn-dream i { font-size: 1.8rem; }
        .btn-dream span { font-size: 0.8rem; font-weight: bold; }
        
        .icon-branco { color: #ffffff !important; }
        .btn-assinar i { font-size: 2.2rem; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: #60a5fa;">MORAES SHOP <span style="color:var(--gold); font-size: 0.7rem;">PRO</span></div>
        <div style="background:#0f172a; padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; border: 1px solid #334155;">V3 RESET</div>
    </div>

    <div id="main-view">
        <div class="welcome-box" id="box-upload">
            <i class="fa fa-file-pdf" style="font-size: 3.5rem; color: #60a5fa; margin-bottom: 15px;"></i>
            <h2 style="margin:0; font-size: 1.2rem;">ABRIR ARQUIVO</h2>
            <label style="background:var(--barra-azul); color:white; padding:15px; border-radius:12px; display:inline-block; font-weight:bold; cursor:pointer; width: 100%; margin-top: 20px;">
                SELECIONAR PDF
                <input type="file" id="file-in" style="display:none" accept="application/pdf">
            </label>
        </div>
        <canvas id="pdf-canvas"></canvas>
    </div>

    <div class="dream-toolbar">
        <button id="assinar" class="btn-dream btn-assinar" onclick="assinarDireto()">
            <i class="fa fa-pen-nib"></i>
            <span>Assinar</span>
        </button>
        
        <button id="imprimir" class="btn-dream" onclick="window.print()">
            <i class="fa fa-print icon-branco"></i>
            <span>Imprimir</span>
        </button>
        
        <button id="whats" class="btn-dream" onclick="alert('WhatsApp em breve')">
            <i class="fa fa-share-nodes" style="color:#4ade80"></i>
            <span>WhatsApp</span>
        </button>
        
        <button class="btn-dream ativo" onclick="location.reload()">
            <i class="fa fa-rotate-left" style="color: #cbd5e1;"></i>
            <span>Limpar</span>
        </button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        document.getElementById('file-in').onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function() {
                const bytes = new Uint8Array(this.result);
                pdfjsLib.getDocument(bytes).promise.then(pdf => {
                    pdf.getPage(1).then(page => {
                        const canvas = document.getElementById('pdf-canvas');
                        const viewport = page.getViewport({scale: 2.8});
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        canvas.style.display = 'block';
                        document.getElementById('box-upload').style.display = 'none';
                        document.querySelectorAll('.btn-dream').forEach(btn => btn.classList.add('ativo'));
                        page.render({canvasContext: canvas.getContext('2d'), viewport: viewport});
                    });
                });
            };
            reader.readAsArrayBuffer(file);
        };

        function assinarDireto() {
            const canvas = document.getElementById('pdf-canvas');
            if(canvas.style.display === 'none') return;
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/jpeg", 0.95);
            link.download = 'assinar_agora.jpg';
            link.click();
        }
    </script>
</body>
</html>
