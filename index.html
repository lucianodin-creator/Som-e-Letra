<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA - PREMIUM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 30px; }
        .nav-bar { background: #1db954; color: #000; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .search-box { padding: 15px; background: #121212; display: flex; gap: 8px; border-bottom: 1px solid #1db954; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; outline: none; }
        button { background: #1db954; border: none; border-radius: 25px; padding: 0 20px; font-weight: bold; cursor: pointer; }
        #player-wrapper { width: 100%; aspect-ratio: 16/9; display: none; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .lista { padding: 10px; }
        .card { display: flex; align-items: center; gap: 12px; padding: 12px; background: #121212; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .card img { width: 90px; height: 60px; border-radius: 4px; object-fit: cover; }
        .titulo { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-bar">🎧 SOM E LETRA</div>
    <div id="player-wrapper"></div>
    <div class="search-box">
        <input type="text" id="busca" placeholder="Digite Djavan, Roberto Carlos..." autocomplete="off">
        <button onclick="buscar()">BUSCAR</button>
    </div>
    <div id="listaResultados" class="lista"></div>

    <script>
        async function buscar() {
            const termo = document.getElementById('busca').value;
            if(!termo) return;
            const lista = document.getElementById('listaResultados');
            lista.innerHTML = "<p style='text-align:center; color:#1db954'>Buscando sucessos...</p>";
            try {
                const res = await fetch(`https://invidious.lunar.icu/api/v1/search?q=${encodeURIComponent(termo)}&type=video`);
                const data = await res.json();
                lista.innerHTML = "";
                data.slice(0, 15).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.onclick = () => {
                        const wrapper = document.getElementById('player-wrapper');
                        wrapper.style.display = "block";
                        // Usando o player desbloqueado para o seu link lucianodin-creator
                        wrapper.innerHTML = `<iframe src="https://invidious.lunar.icu/embed/${item.videoId}?autoplay=1" allowfullscreen></iframe>`;
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    div.innerHTML = `
                        <img src="https://invidious.lunar.icu/vi/${item.videoId}/mqdefault.jpg">
                        <span class="titulo">${item.title}</span>
                    `;
                    lista.appendChild(div);
                });
            } catch (e) {
                lista.innerHTML = "<p style='text-align:center'>Erro de conexão. Tente novamente.</p>";
            }
        }
    </script>
</body>
</html>
