<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; }
        .nav-bar { padding: 15px; background: #1db954; text-align: center; font-weight: bold; }
        .search-area { padding: 15px; display: flex; gap: 8px; background: #181818; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #282828; color: white; outline: none; }
        button { background: #1db954; border: none; border-radius: 8px; padding: 0 20px; color: white; font-weight: bold; cursor: pointer; }
        
        #playerContainer { width: 100%; display: none; background: #000; }
        #playerContainer iframe { width: 100%; aspect-ratio: 16 / 9; border: none; }

        .lista-musicas { padding: 10px; }
        .musica-card { display: flex; align-items: center; gap: 12px; padding: 10px; background: #181818; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .musica-card img { width: 90px; height: 60px; border-radius: 4px; object-fit: cover; }
        .musica-titulo { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="nav-bar">🎧 SOM E LETRA</div>

    <div class="search-area">
        <input type="text" id="campoBusca" placeholder="Nome do artista ou música...">
        <button onclick="pesquisar()">BUSCAR</button>
    </div>

    <div id="playerContainer"></div>
    <div id="listaResultados" class="lista-musicas"></div>

    <script>
        async function pesquisar() {
            const termo = document.getElementById('campoBusca').value;
            if(!termo) return;
            
            const lista = document.getElementById('listaResultados');
            const player = document.getElementById('playerContainer');
            lista.innerHTML = "<p style='text-align:center'>Buscando músicas...</p>";
            player.style.display = "none";

            try {
                // Busca direta de vídeo (Ignora o visual do buscador)
                const res = await fetch(`https://invidious.lunar.icu/api/v1/search?q=${encodeURIComponent(termo)}&type=video`);
                const data = await res.json();
                
                lista.innerHTML = "";
                data.slice(0, 12).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'musica-card';
                    div.onclick = () => {
                        player.style.display = "block";
                        player.innerHTML = `<iframe src="https://www.youtube.com/embed/${item.videoId}?autoplay=1" allowfullscreen></iframe>`;
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    div.innerHTML = `
                        <img src="https://invidious.lunar.icu/vi/${item.videoId}/mqdefault.jpg">
                        <span class="musica-titulo">${item.title}</span>
                    `;
                    lista.appendChild(div);
                });
            } catch (e) {
                lista.innerHTML = "<p style='text-align:center'>Erro ao carregar. Tente novamente.</p>";
            }
        }
    </script>
</body>
</html>
