<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA PRO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 2px solid #39ff14; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        /* Link de imagem otimizado para carregar sempre */
        .card img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .info { padding: 8px; font-size: 13px; font-weight: bold; color: #39ff14; }
        .text-box { padding: 20px; white-space: pre-line; line-height: 1.6; font-size: 16px; min-height: 100px; }
    </style>
</head>
<body>

<div id="player" class="video-container">
    <div style="padding-top: 20%; color: #444;">Toque numa música para carregar</div>
</div>

<div id="letra" class="text-box">Selecione uma música abaixo...</div>

<div class="grid" id="lista"></div>

<script>
    const musicas = [
        { t: "Always", a: "Bon Jovi", id: "9S-70L_S9Xo", l: "This Romeo is bleeding\nBut you can't see his blood" },
        { t: "Hotel California", a: "Eagles", id: "h0G1Ucw5I3c", l: "On a dark desert highway\nCool wind in my hair" },
        { t: "Deixa a Vida Me Levar", a: "Zeca Pagodinho", id: "LAtidm-8D-0", l: "Eu já passei por quase tudo nessa vida" },
        { t: "Sina", a: "Djavan", id: "z7VbvUxj-hw" }
    ];

    function render() {
        const lista = document.getElementById('lista');
        lista.innerHTML = musicas.map((m, i) => `
            <div class="card" onclick="tocar(${i})">
                <img src="https://i.ytimg.com/vi/${m.id}/hqdefault.jpg">
                <div class="info">${m.t}</div>
            </div>`).join('');
    }

    function tocar(i) {
        const m = musicas[i];
        // O segredo do vídeo: youtube.com/embed/ + origin
        const url = `https://www.youtube.com/embed/${m.id}?autoplay=1&rel=0&modestbranding=1`;
        document.getElementById('player').innerHTML = `<iframe width="100%" height="100%" src="${url}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
        document.getElementById('letra').innerText = m.l;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    window.onload = render;
</script>
</body>
</html>
