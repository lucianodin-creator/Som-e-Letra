<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOM E LETRA</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; }
        .nav-bar { padding: 15px; background: #1db954; text-align: center; font-weight: bold; font-size: 20px; }
        .search-area { padding: 20px; display: flex; gap: 10px; background: #181818; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #282828; color: white; outline: none; }
        button { background: #1db954; border: none; border-radius: 25px; padding: 0 25px; color: white; font-weight: bold; cursor: pointer; }
        
        /* Lista de Músicas Estilizada */
        #listaMusicas { padding: 15px; display: grid; gap: 15px; }
        .musica-item { background: #282828; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .musica-item:hover { background: #3e3e3e; }
        .musica-item img { width: 80px; height: 60px; border-radius: 5px; object-fit: cover; }
        .info { display: flex; flex-direction: column; }
        .titulo { font-weight: bold; font-size: 14px; color: #fff; }
        .canal { font-size: 12px; color: #b3b3b3; }

        /* Player Flutuante */
        #playerContainer { display: none; padding: 15px; background: #000; border-radius: 10px; margin: 15px; }
        iframe { width: 100%; height: 200px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="nav-bar">🎧 SOM E LETRA</div>

    <div class="search-area">
        <input type="text" id="campoBusca" placeholder="Ex: Djavan, Roberto Carlos..." autocomplete="off">
        <button onclick="pesquisar()">BUSCAR</button>
    </div>

    <div id="playerContainer"></div>

    <div id="listaMusicas"></div>

    <script>
        async function pesquisar() {
            const termo = document.getElementById('campoBusca').value;
            if(!termo) return;
            
            const lista = document.getElementById('listaMusicas');
            const player = document.getElementById('playerContainer');
            lista.innerHTML = "<p style='text-align:center'>Procurando músicas...</p>";
            player.style.display = "none";

            // Usando a API do YouTube via Invidious (Gratuita e sem anúncios/bloqueios)
            try {
                const response = await fetch(`https://invidious.lunar.icu/api/v1/search?q=${encodeURIComponent(termo)}&type=video`);
                const data = await response.json();
                
                lista.innerHTML = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'musica-item';
                    div.onclick = () => carregarVideo(item.videoId);
                    div.innerHTML = `
                        <img src="https://invidious.lunar.icu/vi/${item.videoId}/mqdefault.jpg">
                        <div class="info">
                            <span class="titulo">${item.title}</span>
                            <span class="canal">${item.author}</span>
                        </div>
                    `;
                    lista.appendChild(div);
                });
            } catch (error) {
                lista.innerHTML = "<p style='text-align:center'>Erro ao carregar. Tente novamente.</p>";
            }
        }

        function carregarVideo(id) {
            const player = document.getElementById('playerContainer');
            player.style.display = "block";
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('campoBusca').addEventListener('keypress', (e) => { if (e.key === 'Enter') pesquisar(); });
    </script>
</body>
</html>
